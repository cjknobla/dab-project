# This is a Databricks asset bundle definition for dab_project.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: dab_project
  uuid: 5af8cc02-fce1-4af5-8397-f677f2d9abd7

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    default: "citibike_dev"
    description: The catalog to use
  schema:
    description: The schema to use
  dev_flag:
    default: true

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://adb-7405610065863049.9.azuredatabricks.net
    variables:
      schema: dev
    presets:
      artifacts_dynamic_version: true

  test:
    mode: production
    presets:
     name_prefix: '[testing]'
    workspace:
      host: https://adb-7405608974932665.5.azuredatabricks.net/
      # We explicitly deploy to /Workspace/Users/cjknobla_gmail.com#ext#@cjknoblagmail.onmicrosoft.com to make sure we only have a single copy.
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: "citibike_test"
      schema: prod
      dev_flag: false
    permissions:
      - service_principal_name: b18c25c9-e662-424c-8acd-c9004bdd37e6
        level: CAN_MANAGE
    run_as:
      service_principal_name: b18c25c9-e662-424c-8acd-c9004bdd37e6

  prod:
    mode: production
    workspace:
      host: https://adb-7405619131964709.9.azuredatabricks.net/
      # We explicitly deploy to /Workspace/Users/cjknobla_gmail.com#ext#@cjknoblagmail.onmicrosoft.com to make sure we only have a single copy.
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: "citibike_prod"
      schema: prod
      dev_flag: false
    permissions:
      - service_principal_name: e964db6e-8bbc-436b-938e-2f83d6076062
        level: CAN_MANAGE
    run_as:
      service_principal_name: e964db6e-8bbc-436b-938e-2f83d6076062
